name: class_app_mobile
description: IoT Classroom Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_database: ^10.3.3
  fl_chart: ^0.66.0
  intl: ^0.18.1
  web_socket_channel: ^2.4.0
  provider: ^6.1.1
  equatable: ^2.0.5
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# ONLY ONE flutter: SECTION - DELETE ANY DUPLICATES
flutter:
  uses-material-design: true
  assets:
    - assets/   # Keep only one line